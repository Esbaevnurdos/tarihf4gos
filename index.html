<!doctype html>
<html lang="kk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Қазақстан тарихы — Флэшкарталар</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Sans+3:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0f0e0c;
        --surface: #1a1814;
        --gold: #c9a84c;
        --gold-light: #e8c97a;
        --text: #f0ead6;
        --muted: #8a7f6a;
        --border: #2e2a22;
        --card-front: #1e1b15;
        --card-back: #16211a;
        --accent: #4a8c6a;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Source Sans 3", sans-serif;
        min-height: 100vh;
        padding: 2rem 1rem 4rem;
      }

      header {
        text-align: center;
        margin-bottom: 3rem;
      }

      header h1 {
        font-family: "Playfair Display", serif;
        font-size: clamp(1.8rem, 4vw, 3rem);
        color: var(--gold);
        letter-spacing: 0.02em;
        line-height: 1.2;
      }

      header p {
        color: var(--muted);
        font-size: 0.95rem;
        margin-top: 0.5rem;
        letter-spacing: 0.05em;
      }

      .controls {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 1rem;
        margin-bottom: 2.5rem;
        flex-wrap: wrap;
      }

      .stat {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 0.5rem 1.25rem;
        font-size: 0.85rem;
        color: var(--muted);
      }

      .stat span {
        color: var(--gold);
        font-weight: 600;
      }

      .btn {
        background: transparent;
        border: 1px solid var(--gold);
        color: var(--gold);
        padding: 0.5rem 1.25rem;
        border-radius: 8px;
        font-family: "Source Sans 3", sans-serif;
        font-size: 0.85rem;
        cursor: pointer;
        letter-spacing: 0.05em;
        transition:
          background 0.2s,
          color 0.2s;
      }

      .btn:hover {
        background: var(--gold);
        color: var(--bg);
      }

      .btn.accent {
        border-color: var(--accent);
        color: var(--accent);
      }
      .btn.accent:hover {
        background: var(--accent);
        color: #fff;
      }

      /* Card navigation */
      .nav {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
        margin-bottom: 2rem;
      }

      .nav-btn {
        width: 44px;
        height: 44px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 50%;
        color: var(--text);
        font-size: 1.2rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          border-color 0.2s,
          color 0.2s;
      }

      .nav-btn:hover {
        border-color: var(--gold);
        color: var(--gold);
      }
      .nav-btn:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }

      .card-counter {
        font-family: "Playfair Display", serif;
        font-size: 1.1rem;
        color: var(--muted);
        min-width: 80px;
        text-align: center;
      }

      .card-counter .current {
        color: var(--gold);
        font-size: 1.5rem;
      }

      /* Flashcard */
      .scene {
        width: 100%;
        max-width: 680px;
        height: 340px;
        margin: 0 auto 1.5rem;
        perspective: 1200px;
        cursor: pointer;
      }

      .card-inner {
        width: 100%;
        height: 100%;
        position: relative;
        transform-style: preserve-3d;
        transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .card-inner.flipped {
        transform: rotateY(180deg);
      }

      .card-face {
        position: absolute;
        inset: 0;
        backface-visibility: hidden;
        border-radius: 16px;
        padding: 2.5rem;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        overflow: hidden;
      }

      .card-front {
        background: var(--card-front);
        border: 1px solid var(--border);
      }

      .card-front::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(90deg, var(--gold), transparent);
      }

      .card-back {
        background: var(--card-back);
        border: 1px solid #1e3329;
        transform: rotateY(180deg);
      }

      .card-back::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(90deg, var(--accent), transparent);
      }

      .card-label {
        font-size: 0.7rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: var(--muted);
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .card-label .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--gold);
      }

      .card-back .card-label .dot {
        background: var(--accent);
      }

      .q-number {
        font-family: "Playfair Display", serif;
        font-size: 4rem;
        color: var(--border);
        position: absolute;
        top: 1.5rem;
        right: 2rem;
        line-height: 1;
        user-select: none;
      }

      .card-content {
        flex: 1;
        display: flex;
        align-items: center;
      }

      .front-text {
        font-family: "Playfair Display", serif;
        font-size: clamp(1rem, 2.5vw, 1.35rem);
        line-height: 1.5;
        color: var(--text);
        max-width: 90%;
      }

      .back-text {
        font-size: clamp(0.85rem, 1.8vw, 1rem);
        line-height: 1.75;
        color: #c8d4be;
      }

      .card-hint {
        font-size: 0.75rem;
        color: var(--muted);
        letter-spacing: 0.08em;
      }

      /* Progress bar */
      .progress-wrap {
        max-width: 680px;
        margin: 0 auto 1rem;
      }

      .progress-track {
        height: 2px;
        background: var(--border);
        border-radius: 2px;
        overflow: hidden;
      }

      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--gold), var(--accent));
        transition: width 0.4s ease;
      }

      /* Grid view */
      .grid-view {
        display: none;
        max-width: 1100px;
        margin: 0 auto;
        columns: 3;
        column-gap: 1rem;
      }

      .grid-view.visible {
        display: block;
      }

      .grid-card {
        break-inside: avoid;
        margin-bottom: 1rem;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
        cursor: pointer;
        transition: border-color 0.2s;
      }

      .grid-card:hover {
        border-color: var(--gold);
      }

      .grid-q {
        background: var(--card-front);
        border-bottom: 1px solid var(--border);
        padding: 0.75rem 1rem;
        font-size: 0.8rem;
        color: var(--text);
        line-height: 1.5;
      }

      .grid-num {
        font-family: "Playfair Display", serif;
        color: var(--gold);
        font-size: 0.7rem;
        margin-bottom: 4px;
      }

      .grid-a {
        padding: 0.75rem 1rem;
        font-size: 0.75rem;
        color: var(--muted);
        line-height: 1.6;
        display: none;
      }

      .grid-a.open {
        display: block;
        color: #9dba8e;
      }

      .grid-toggle {
        display: block;
        width: 100%;
        padding: 0.4rem;
        background: transparent;
        border: none;
        border-top: 1px solid var(--border);
        color: var(--muted);
        font-size: 0.7rem;
        cursor: pointer;
        letter-spacing: 0.08em;
        transition: color 0.2s;
      }

      .grid-toggle:hover {
        color: var(--gold);
      }

      .flashcard-section {
      }
      .flashcard-section.hidden {
        display: none;
      }

      @media (max-width: 700px) {
        .grid-view {
          columns: 1;
        }
        .scene {
          height: 280px;
        }
        .card-face {
          padding: 1.5rem;
        }
      }
      @media (min-width: 701px) and (max-width: 1000px) {
        .grid-view {
          columns: 2;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Қазақстан тарихы</h1>
      <p>100 сұрақ · Флэшкарталар</p>
    </header>

    <div class="controls">
      <div class="stat">
        Картаның нөмірі: <span id="stat-current">1</span> / 100
      </div>
      <div class="stat">Аударылған: <span id="stat-flipped">0</span></div>
      <button class="btn" onclick="toggleView()" id="view-btn">
        Тізім түрі
      </button>
      <button class="btn accent" onclick="shuffle()">Араластыру</button>
      <button class="btn" onclick="resetAll()">Бастапқы</button>
    </div>

    <div class="flashcard-section" id="card-section">
      <div class="progress-wrap">
        <div class="progress-track">
          <div class="progress-fill" id="progress" style="width: 1%"></div>
        </div>
      </div>

      <div class="nav">
        <button class="nav-btn" id="prev-btn" onclick="prevCard()">
          &#8592;
        </button>
        <div class="card-counter">
          <span class="current" id="nav-current">1</span>
          <span style="color: var(--muted)"> / </span>
          <span>100</span>
        </div>
        <button class="nav-btn" id="next-btn" onclick="nextCard()">
          &#8594;
        </button>
      </div>

      <div class="scene" onclick="flipCard()" id="scene">
        <div class="card-inner" id="card-inner">
          <div class="card-face card-front">
            <div class="card-label">
              <div class="dot"></div>
              Сұрақ
            </div>
            <div class="q-number" id="q-num-display">01</div>
            <div class="card-content">
              <div class="front-text" id="card-question"></div>
            </div>
            <div class="card-hint">Жауапты көру үшін картаны басыңыз</div>
          </div>
          <div class="card-face card-back">
            <div class="card-label">
              <div class="dot"></div>
              Жауап
            </div>
            <div class="card-content">
              <div class="back-text" id="card-answer"></div>
            </div>
            <div class="card-hint">Артқа оралу үшін қайтадан басыңыз</div>
          </div>
        </div>
      </div>
    </div>

    <div class="grid-view" id="grid-view"></div>

      let order = QA.map((_, i) => i);
      let current = 0;
      let flippedCount = 0;
      let isFlipped = false;
      let inGrid = false;

      function pad(n) {
        return String(n + 1).padStart(2, "0");
      }

      function renderCard() {
        const idx = order[current];
        document.getElementById("card-question").textContent = QA[idx][0];
        document.getElementById("card-answer").textContent = QA[idx][1];
        document.getElementById("q-num-display").textContent = pad(idx);
        document.getElementById("nav-current").textContent = current + 1;
        document.getElementById("stat-current").textContent = current + 1;
        document.getElementById("progress").style.width =
          ((current + 1) / 100) * 100 + "%";
        document.getElementById("prev-btn").disabled = current === 0;
        document.getElementById("next-btn").disabled = current === 99;
        if (isFlipped) {
          document.getElementById("card-inner").classList.remove("flipped");
          isFlipped = false;
        }
      }

      function flipCard() {
        const inner = document.getElementById("card-inner");
        isFlipped = !isFlipped;
        inner.classList.toggle("flipped", isFlipped);
        if (isFlipped) {
          flippedCount++;
          document.getElementById("stat-flipped").textContent = flippedCount;
        }
      }

      function nextCard() {
        if (current < 99) {
          current++;
          renderCard();
        }
      }

      function prevCard() {
        if (current > 0) {
          current--;
          renderCard();
        }
      }

      function shuffle() {
        for (let i = order.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [order[i], order[j]] = [order[j], order[i]];
        }
        current = 0;
        renderCard();
      }

      function resetAll() {
        order = QA.map((_, i) => i);
        current = 0;
        flippedCount = 0;
        document.getElementById("stat-flipped").textContent = 0;
        renderCard();
      }

      function toggleView() {
        inGrid = !inGrid;
        document
          .getElementById("card-section")
          .classList.toggle("hidden", inGrid);
        const gv = document.getElementById("grid-view");
        const btn = document.getElementById("view-btn");
        if (inGrid) {
          gv.classList.add("visible");
          btn.textContent = "Карта түрі";
          renderGrid();
        } else {
          gv.classList.remove("visible");
          btn.textContent = "Тізім түрі";
        }
      }

      function renderGrid() {
        const gv = document.getElementById("grid-view");
        gv.innerHTML = "";
        QA.forEach((qa, i) => {
          const d = document.createElement("div");
          d.className = "grid-card";
          d.innerHTML = `<div class="grid-q"><div class="grid-num">${i + 1}.</div>${qa[0]}</div>
    <div class="grid-a" id="ga-${i}">${qa[1]}</div>
    <button class="grid-toggle" onclick="toggleGridAns(${i},this)">▼ Жауапты көру</button>`;
          gv.appendChild(d);
        });
      }

      function toggleGridAns(i, btn) {
        const ans = document.getElementById("ga-" + i);
        const open = ans.classList.toggle("open");
        btn.textContent = open ? "▲ Жасыру" : "▼ Жауапты көру";
      }

      // Keyboard nav
      document.addEventListener("keydown", (e) => {
        if (inGrid) return;
        if (e.key === "ArrowRight") nextCard();
        if (e.key === "ArrowLeft") prevCard();
        if (e.key === " ") {
          e.preventDefault();
          flipCard();
        }
      });

      renderCard();
    </script>
  </body>
